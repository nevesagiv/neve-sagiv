<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Background circle -->
  <circle cx="32" cy="32" r="32" fill="#1e3a5f"/>

  <!-- Gold inner border -->
  <circle cx="32" cy="32" r="28" fill="none" stroke="#c9a55a" stroke-width="2"/>

  <!-- House icon -->
  <g transform="translate(32 32)">
    <!-- Roof -->
    <path d="M -16 -2 L 0 -16 L 16 -2 Z" fill="#c9a55a"/>
    <!-- House body -->
    <rect x="-12" y="-2" width="24" height="16" fill="#faf7f1"/>
    <!-- Door -->
    <rect x="-3" y="3" width="6" height="11" fill="#1e3a5f"/>
    <!-- Window left -->
    <rect x="-9" y="2" width="4" height="4" fill="#1e3a5f"/>
    <!-- Window right -->
    <rect x="5" y="2" width="4" height="4" fill="#1e3a5f"/>
  </g>
</svg>
