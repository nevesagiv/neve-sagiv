<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <!-- Background gradient -->
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1e3a5f"/>
      <stop offset="100%" stop-color="#0f1f33"/>
    </linearGradient>
    <linearGradient id="goldGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#c9a55a"/>
      <stop offset="100%" stop-color="#e0c891"/>
    </linearGradient>
    <pattern id="dots" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1" fill="#c9a55a" opacity="0.15"/>
    </pattern>
  </defs>

  <rect width="1200" height="630" fill="url(#bgGrad)"/>
  <rect width="1200" height="630" fill="url(#dots)"/>

  <!-- Gold corner accents -->
  <path d="M 0 0 L 200 0 L 0 200 Z" fill="url(#goldGrad)" opacity="0.18"/>
  <path d="M 1200 630 L 1000 630 L 1200 430 Z" fill="url(#goldGrad)" opacity="0.18"/>

  <!-- Gold horizontal divider line -->
  <rect x="100" y="320" width="60" height="3" fill="url(#goldGrad)"/>

  <!-- Tag -->
  <g transform="translate(100, 200)">
    <rect x="0" y="0" width="280" height="40" rx="20" fill="#c9a55a"/>
    <text x="140" y="27" font-family="Heebo, sans-serif" font-size="16" font-weight="600" fill="#1e3a5f" text-anchor="middle" direction="rtl">ליווי מקצועי בכינוסי נכסים</text>
  </g>

  <!-- Main title -->
  <text x="100" y="380" font-family="Heebo, sans-serif" font-size="64" font-weight="800" fill="#ffffff" direction="rtl">שלמה אדיב</text>

  <!-- Subtitle -->
  <text x="100" y="450" font-family="Heebo, sans-serif" font-size="32" font-weight="400" fill="#e0c891" direction="rtl">נכסי הזדמנות, בליווי שמגיע איתם</text>

  <!-- Bottom info -->
  <text x="100" y="540" font-family="Heebo, sans-serif" font-size="18" font-weight="500" fill="#faf7f1" direction="rtl" opacity="0.7">עברית · Русский · עשרות נכסים פעילים בכל הארץ</text>

  <!-- House icon (top right corner) -->
  <g transform="translate(950, 130)">
    <circle cx="0" cy="0" r="100" fill="#1e3a5f" stroke="#c9a55a" stroke-width="3"/>
    <g transform="translate(0, 5) scale(2)">
      <path d="M -16 -2 L 0 -16 L 16 -2 Z" fill="#c9a55a"/>
      <rect x="-12" y="-2" width="24" height="16" fill="#faf7f1"/>
      <rect x="-3" y="3" width="6" height="11" fill="#1e3a5f"/>
      <rect x="-9" y="2" width="4" height="4" fill="#1e3a5f"/>
      <rect x="5" y="2" width="4" height="4" fill="#1e3a5f"/>
    </g>
  </g>
</svg>
